[theme]
primaryColor = "#3b82f6"
backgroundColor = "#0a0e1a"
secondaryBackgroundColor = "#1a202c"
textColor = "#f1f5f9"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "viewer"

[logger]
level = "info"

[server]
port = 8501
headless = true
runOnSave = true
enableXsrfProtection = true
maxUploadSize = 200
